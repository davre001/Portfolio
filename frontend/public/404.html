<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Davre Studios</title>
    <!-- GitHub Pages SPA fallback (rafgraph/spa-github-pages).
         Serves for any unknown path; encodes the requested path into a query
         string and redirects to the app root, where the decoder in index.html
         restores the real URL. pathSegmentsToKeep = 0 for a root-domain deploy. -->
    <script>
      (function () {
        var pathSegmentsToKeep = 0;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
